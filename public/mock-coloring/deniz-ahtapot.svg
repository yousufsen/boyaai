  <!-- Tentacle 2 -->
  <path d="M420,460 Q370,540 350,620 Q330,700 360,760 Q380,790 400,770" stroke="black" stroke-width="4" fill="none"/>
  <circle cx="400" cy="770" r="12" stroke="black" stroke-width="4" fill="white"/>

  <!-- Tentacle 3 -->
  <path d="M455,470 Q430,560 420,650 Q410,740 430,800 Q445,830 460,810" stroke="black" stroke-width="4" fill="none"/>
  <circle cx="460" cy="810" r="12" stroke="black" stroke-width="4" fill="white"/>

  <!-- Tentacle 4 (center left) -->
  <path d="M490,475 Q480,570 475,660 Q470,750 485,830 Q495,860 510,840" stroke="black" stroke-width="4" fill="none"/>
  <circle cx="510" cy="840" r="12" stroke="black" stroke-width="4" fill="white"/>

  <!-- Tentacle 5 (center right) -->
  <path d="M534,475 Q544,570 549,660 Q554,750 539,830 Q529,860 514,840" stroke="black" stroke-width="4" fill="none"/>
  <circle cx="514" cy="840" r="12" stroke="black" stroke-width="4" fill="white"/>

  <!-- Tentacle 6 -->
  <path d="M569,470 Q594,560 604,650 Q614,740 594,800 Q579,830 564,810" stroke="black" stroke-width="4" fill="none"/>
  <circle cx="564" cy="810" r="12" stroke="black" stroke-width="4" fill="white"/>

  <!-- Tentacle 7 -->
  <path d="M604,460 Q654,540 674,620 Q694,700 664,760 Q644,790 624,770" stroke="black" stroke-width="4" fill="none"/>
  <circle cx="624" cy="770" r="12" stroke="black" stroke-width="4" fill="white"/>

  <!-- Tentacle 8 (far right) -->
  <path d="M624,440 Q684,520 724,580 Q764,640 744,700 Q724,730 694,710" stroke="black" stroke-width="4" fill="none"/>
  <circle cx="694" cy="710" r="12" stroke="black" stroke-width="4" fill="white"/>

  <!-- Small fish left -->
  <ellipse cx="160" cy="500" rx="40" ry="20" stroke="black" stroke-width="4" fill="white"/>
  <polygon points="200,500 240,475 240,525" stroke="black" stroke-width="4" fill="white"/>
