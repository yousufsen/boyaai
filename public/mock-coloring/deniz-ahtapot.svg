  <polygon points="825,600 790,578 790,622" stroke="black" stroke-width="4" fill="white"/>
  <circle cx="872" cy="596" r="5" stroke="black" stroke-width="3" fill="black"/>

  <!-- Seaweed left -->
  <path d="M80,1024 Q100,920 80,850 Q60,780 80,720 Q100,660 80,600" stroke="black" stroke-width="4" fill="none"/>
  <path d="M120,1024 Q140,940 120,880 Q100,820 120,760" stroke="black" stroke-width="4" fill="none"/>

  <!-- Seaweed right -->
  <path d="M920,1024 Q940,940 920,870 Q900,800 920,740 Q940,680 920,620" stroke="black" stroke-width="4" fill="none"/>
  <path d="M960,1024 Q940,950 960,890 Q980,830 960,780" stroke="black" stroke-width="4" fill="none"/>
</svg>