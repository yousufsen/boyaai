<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <rect width="1024" height="1024" fill="white"/>

  <!-- Bubbles -->
  <circle cx="180" cy="120" r="20" stroke="black" stroke-width="3" fill="white"/>
  <circle cx="220" cy="180" r="12" stroke="black" stroke-width="3" fill="white"/>
  <circle cx="150" cy="200" r="8" stroke="black" stroke-width="3" fill="white"/>
  <circle cx="800" cy="150" r="18" stroke="black" stroke-width="3" fill="white"/>
  <circle cx="840" cy="200" r="10" stroke="black" stroke-width="3" fill="white"/>
  <circle cx="750" cy="100" r="14" stroke="black" stroke-width="3" fill="white"/>
  <circle cx="400" cy="80" r="15" stroke="black" stroke-width="3" fill="white"/>
  <circle cx="650" cy="100" r="10" stroke="black" stroke-width="3" fill="white"/>

  <!-- Top hat -->
  <rect x="430" y="140" width="160" height="120" rx="5" stroke="black" stroke-width="4" fill="white"/>
  <rect x="400" y="255" width="220" height="20" rx="5" stroke="black" stroke-width="4" fill="white"/>
  <!-- Hat band -->
  <rect x="430" y="220" width="160" height="20" stroke="black" stroke-width="3" fill="white"/>

