  <!-- Eyes -->
  <circle cx="465" cy="340" r="25" stroke="black" stroke-width="4" fill="white"/>
  <circle cx="559" cy="340" r="25" stroke="black" stroke-width="4" fill="white"/>
  <circle cx="470" cy="336" r="10" stroke="black" stroke-width="3" fill="black"/>
  <circle cx="564" cy="336" r="10" stroke="black" stroke-width="3" fill="black"/>
  <!-- Eye shine -->
  <circle cx="475" cy="330" r="4" fill="white"/>
  <circle cx="569" cy="330" r="4" fill="white"/>

  <!-- Smile -->
  <path d="M470,390 Q512,430 554,390" stroke="black" stroke-width="4" fill="none"/>

  <!-- Cheeks -->
  <circle cx="430" cy="385" r="15" stroke="black" stroke-width="2" fill="white"/>
  <circle cx="594" cy="385" r="15" stroke="black" stroke-width="2" fill="white"/>

  <!-- Tentacle 1 (far left) -->
  <path d="M400,440 Q340,520 300,580 Q260,640 280,700 Q300,730 330,710" stroke="black" stroke-width="4" fill="none"/>
