<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <rect width="1024" height="1024" fill="white"/>

  <!-- Sun in corner -->
  <circle cx="900" cy="100" r="50" stroke="black" stroke-width="4" fill="white"/>
  <line x1="900" y1="30" x2="900" y2="10" stroke="black" stroke-width="3"/>
  <line x1="950" y1="50" x2="970" y2="30" stroke="black" stroke-width="3"/>
  <line x1="970" y1="100" x2="990" y2="100" stroke="black" stroke-width="3"/>
  <line x1="950" y1="150" x2="970" y2="170" stroke="black" stroke-width="3"/>
  <line x1="900" y1="170" x2="900" y2="190" stroke="black" stroke-width="3"/>
  <line x1="850" y1="150" x2="830" y2="170" stroke="black" stroke-width="3"/>
  <line x1="830" y1="100" x2="810" y2="100" stroke="black" stroke-width="3"/>
  <line x1="850" y1="50" x2="830" y2="30" stroke="black" stroke-width="3"/>

  <!-- Birds -->
  <path d="M120,120 Q135,100 150,120" stroke="black" stroke-width="3" fill="none"/>
  <path d="M180,100 Q195,80 210,100" stroke="black" stroke-width="3" fill="none"/>
  <path d="M150,160 Q165,140 180,160" stroke="black" stroke-width="3" fill="none"/>

  <!-- Castle main wall -->
  <rect x="300" y="280" width="424" height="300" stroke="black" stroke-width="4" fill="white"/>

  <!-- Left tower -->
  <rect x="250" y="180" width="100" height="400" stroke="black" stroke-width="4" fill="white"/>
  <!-- Left tower roof (cone) -->
  <polygon points="240,180 300,80 360,180" stroke="black" stroke-width="4" fill="white"/>
  <!-- Left tower flag -->
  <line x1="300" y1="80" x2="300" y2="40" stroke="black" stroke-width="3"/>
  <polygon points="300,40 340,55 300,70" stroke="black" stroke-width="4" fill="white"/>
  <!-- Left tower battlements -->
  <rect x="250" y="170" width="20" height="25" stroke="black" stroke-width="3" fill="white"/>
  <rect x="290" y="170" width="20" height="25" stroke="black" stroke-width="3" fill="white"/>
  <rect x="330" y="170" width="20" height="25" stroke="black" stroke-width="3" fill="white"/>
  <!-- Left tower window -->
  <path d="M285,260 A15,15 0 0,1 315,260 L315,300 L285,300 Z" stroke="black" stroke-width="4" fill="white"/>

  <!-- Right tower -->
  <rect x="674" y="180" width="100" height="400" stroke="black" stroke-width="4" fill="white"/>
  <!-- Right tower roof -->
  <polygon points="664,180 724,80 784,180" stroke="black" stroke-width="4" fill="white"/>
  <!-- Right tower flag -->
  <line x1="724" y1="80" x2="724" y2="40" stroke="black" stroke-width="3"/>
  <polygon points="724,40 764,55 724,70" stroke="black" stroke-width="4" fill="white"/>
  <!-- Right tower battlements -->
  <rect x="674" y="170" width="20" height="25" stroke="black" stroke-width="3" fill="white"/>
  <rect x="714" y="170" width="20" height="25" stroke="black" stroke-width="3" fill="white"/>
  <rect x="754" y="170" width="20" height="25" stroke="black" stroke-width="3" fill="white"/>
  <!-- Right tower window -->
  <path d="M709,260 A15,15 0 0,1 739,260 L739,300 L709,300 Z" stroke="black" stroke-width="4" fill="white"/>

  <!-- Center tower (taller) -->
  <rect x="450" y="150" width="124" height="130" stroke="black" stroke-width="4" fill="white"/>
  <!-- Center tower roof -->
  <polygon points="440,150 512,60 584,150" stroke="black" stroke-width="4" fill="white"/>
  <!-- Center flag -->
  <line x1="512" y1="60" x2="512" y2="15" stroke="black" stroke-width="3"/>
  <polygon points="512,15 555,30 512,45" stroke="black" stroke-width="4" fill="white"/>
  <!-- Center tower window (round) -->
  <circle cx="512" cy="220" r="22" stroke="black" stroke-width="4" fill="white"/>
  <!-- Window cross -->
  <line x1="512" y1="198" x2="512" y2="242" stroke="black" stroke-width="3"/>
  <line x1="490" y1="220" x2="534" y2="220" stroke="black" stroke-width="3"/>

  <!-- Main wall battlements -->
  <rect x="355" y="268" width="25" height="25" stroke="black" stroke-width="3" fill="white"/>
  <rect x="400" y="268" width="25" height="25" stroke="black" stroke-width="3" fill="white"/>
  <rect x="600" y="268" width="25" height="25" stroke="black" stroke-width="3" fill="white"/>
  <rect x="645" y="268" width="25" height="25" stroke="black" stroke-width="3" fill="white"/>

  <!-- Gate (arched door) -->
  <path d="M470,580 L470,480 A42,42 0 0,1 554,480 L554,580 Z" stroke="black" stroke-width="4" fill="white"/>
  <!-- Gate details -->
  <line x1="512" y1="450" x2="512" y2="580" stroke="black" stroke-width="3"/>
  <line x1="470" y1="510" x2="554" y2="510" stroke="black" stroke-width="3"/>
  <line x1="470" y1="545" x2="554" y2="545" stroke="black" stroke-width="3"/>

  <!-- Windows on main wall -->
  <path d="M370,380 A18,18 0 0,1 406,380 L406,430 L370,430 Z" stroke="black" stroke-width="4" fill="white"/>
  <path d="M618,380 A18,18 0 0,1 654,380 L654,430 L618,430 Z" stroke="black" stroke-width="4" fill="white"/>

  <!-- Clouds base -->
  <ellipse cx="300" cy="620" rx="120" ry="50" stroke="black" stroke-width="4" fill="white"/>
  <ellipse cx="512" cy="630" rx="150" ry="55" stroke="black" stroke-width="4" fill="white"/>
  <ellipse cx="720" cy="620" rx="120" ry="50" stroke="black" stroke-width="4" fill="white"/>
  <ellipse cx="400" cy="650" rx="130" ry="50" stroke="black" stroke-width="4" fill="white"/>
  <ellipse cx="620" cy="650" rx="130" ry="50" stroke="black" stroke-width="4" fill="white"/>

  <!-- More clouds below -->
  <ellipse cx="200" cy="680" rx="100" ry="40" stroke="black" stroke-width="4" fill="white"/>
  <ellipse cx="350" cy="700" rx="110" ry="45" stroke="black" stroke-width="4" fill="white"/>
  <ellipse cx="512" cy="710" rx="120" ry="40" stroke="black" stroke-width="4" fill="white"/>
  <ellipse cx="680" cy="700" rx="110" ry="45" stroke="black" stroke-width="4" fill="white"/>
  <ellipse cx="830" cy="680" rx="100" ry="40" stroke="black" stroke-width="4" fill="white"/>

  <!-- Bottom clouds layer -->
  <ellipse cx="150" cy="750" rx="130" ry="45" stroke="black" stroke-width="4" fill="white"/>
  <ellipse cx="350" cy="760" rx="140" ry="45" stroke="black" stroke-width="4" fill="white"/>
  <ellipse cx="550" cy="755" rx="130" ry="45" stroke="black" stroke-width="4" fill="white"/>
  <ellipse cx="750" cy="760" rx="140" ry="45" stroke="black" stroke-width="4" fill="white"/>
  <ellipse cx="920" cy="750" rx="110" ry="45" stroke="black" stroke-width="4" fill="white"/>

  <!-- Stars below clouds -->
  <polygon points="200,860 206,878 225,878 210,888 216,906 200,896 184,906 190,888 175,878 194,878" stroke="black" stroke-width="3" fill="white"/>
  <polygon points="500,880 506,898 525,898 510,908 516,926 500,916 484,926 490,908 475,898 494,898" stroke="black" stroke-width="3" fill="white"/>
  <polygon points="800,850 806,868 825,868 810,878 816,896 800,886 784,896 790,878 775,868 794,868" stroke="black" stroke-width="3" fill="white"/>
  <polygon points="350,920 355,935 370,935 358,943 363,958 350,950 337,958 342,943 330,935 345,935" stroke="black" stroke-width="3" fill="white"/>
  <polygon points="650,930 655,945 670,945 658,953 663,968 650,960 637,968 642,953 630,945 645,945" stroke="black" stroke-width="3" fill="white"/>
</svg>